<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S-DRRS | Ders Dağıtım Programı</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #0f1117;
  --bg2: #161b27;
  --bg3: #1e2536;
  --card: #1a2133;
  --border: #2a3550;
  --accent: #4f8ef7;
  --accent2: #7c5cfc;
  --accent3: #2dd4a0;
  --warn: #f59e0b;
  --danger: #ef4444;
  --success: #22c55e;
  --text: #e8eaf6;
  --text2: #8899bb;
  --text3: #4a5a7a;
  --sidebar-w: 230px;
  --header-h: 56px;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Nunito', sans-serif;
  --radius: 10px;
  --radius-lg: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* LAYOUT */
#app { display: flex; min-height: 100vh; }

/* SIDEBAR */
#sidebar {
  width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform 0.3s cubic-bezier(.4,0,.2,1);
}
#sidebar .logo {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
}
#sidebar .logo .brand {
  font-size: 1.4rem;
  font-weight: 900;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
#sidebar .logo .sub {
  font-size: 0.7rem;
  color: var(--text3);
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 2px;
}
.nav-group { padding: 10px 0; }
.nav-group-title {
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  padding: 6px 20px 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  border-radius: 0;
  color: var(--text2);
  font-size: 0.88rem;
  font-weight: 600;
  transition: all 0.15s;
  border-left: 3px solid transparent;
  position: relative;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active {
  background: rgba(79,142,247,0.1);
  color: var(--accent);
  border-left-color: var(--accent);
}
.nav-item .icon { font-size: 1rem; width: 18px; text-align: center; flex-shrink: 0; }
.nav-badge {
  margin-left: auto;
  background: var(--accent2);
  color: white;
  font-size: 0.65rem;
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 700;
}
.sidebar-footer {
  margin-top: auto;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
}
.school-badge {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.school-badge:hover { border-color: var(--accent); }
.school-badge .sname {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.school-badge .syear {
  font-size: 0.72rem;
  color: var(--text3);
  margin-top: 2px;
}

/* MAIN */
#main {
  margin-left: var(--sidebar-w);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
#topbar {
  height: var(--header-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 50;
}
#topbar .page-title {
  font-size: 1rem;
  font-weight: 800;
  color: var(--text);
  flex: 1;
}
#topbar .topbar-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}
#menu-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  font-size: 1.3rem;
  cursor: pointer;
  padding: 4px 8px;
}
#content {
  flex: 1;
  padding: 24px;
  max-width: 1400px;
  width: 100%;
}

/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius);
  border: none;
  cursor: pointer;
  font-family: var(--sans);
  font-size: 0.84rem;
  font-weight: 700;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #3a7ee8; transform: translateY(-1px); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #16a34a; }
.btn-warn { background: var(--warn); color: white; }
.btn-warn:hover { background: #d97706; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #dc2626; }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg3); color: var(--text); }
.btn-purple { background: var(--accent2); color: white; }
.btn-purple:hover { background: #6b4de6; }
.btn-teal { background: var(--accent3); color: #0f1117; }
.btn-teal:hover { background: #1fb887; }
.btn-sm { padding: 4px 10px; font-size: 0.78rem; }
.btn-lg { padding: 10px 20px; font-size: 0.96rem; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
.btn-icon { padding: 6px 8px; }

/* CARDS */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  gap: 12px;
}
.card-title {
  font-size: 0.95rem;
  font-weight: 800;
  color: var(--text);
}

/* FORMS */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--text2);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.form-control {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--sans);
  font-size: 0.88rem;
  outline: none;
  transition: border-color 0.2s;
}
.form-control:focus { border-color: var(--accent); }
.form-control::placeholder { color: var(--text3); }
select.form-control option { background: var(--bg3); color: var(--text); }

/* GRID HELPERS */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
.flex { display: flex; }
.flex-wrap { flex-wrap: wrap; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.mb-8 { margin-bottom: 8px; }
.mb-12 { margin-bottom: 12px; }
.mb-16 { margin-bottom: 16px; }

/* TABLES */
.tbl-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
thead tr { background: var(--bg3); }
th {
  padding: 10px 12px;
  text-align: left;
  font-size: 0.72rem;
  font-weight: 800;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 9px 12px;
  border-bottom: 1px solid rgba(42,53,80,0.5);
  color: var(--text);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,0.02); }
.text-center { text-align: center; }
.text-right { text-align: right; }

/* BADGES */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 700;
}
.badge-blue { background: rgba(79,142,247,0.15); color: var(--accent); border: 1px solid rgba(79,142,247,0.3); }
.badge-green { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.3); }
.badge-red { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
.badge-warn { background: rgba(245,158,11,0.15); color: var(--warn); border: 1px solid rgba(245,158,11,0.3); }
.badge-purple { background: rgba(124,92,252,0.15); color: var(--accent2); border: 1px solid rgba(124,92,252,0.3); }
.badge-teal { background: rgba(45,212,160,0.15); color: var(--accent3); border: 1px solid rgba(45,212,160,0.3); }

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 600px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
  transform: scale(0.95) translateY(10px);
  transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: scale(1) translateY(0); }
.modal-lg { max-width: 860px; }
.modal-xl { max-width: 1100px; }
.modal-header {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title { font-size: 1rem; font-weight: 800; }
.modal-close {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 1.2rem;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
}
.modal-close:hover { background: var(--bg3); color: var(--text); }
.modal-body { padding: 20px 22px; }
.modal-footer {
  padding: 14px 22px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* TABS */
.tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; gap: 4px; overflow-x: auto; }
.tab {
  padding: 10px 16px;
  font-size: 0.84rem;
  font-weight: 700;
  color: var(--text2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ALERTS */
.alert {
  padding: 11px 14px;
  border-radius: var(--radius);
  font-size: 0.84rem;
  font-weight: 600;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 12px;
}
.alert-warn { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: var(--warn); }
.alert-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--danger); }
.alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--success); }
.alert-info { background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.3); color: var(--accent); }

/* TOAST */
#toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 16px;
  font-size: 0.84rem;
  font-weight: 600;
  box-shadow: var(--shadow);
  animation: slideIn 0.3s ease;
  pointer-events: all;
  max-width: 340px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.success { border-left: 3px solid var(--success); }
.toast.error { border-left: 3px solid var(--danger); }
.toast.warn { border-left: 3px solid var(--warn); }
.toast.info { border-left: 3px solid var(--accent); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* TIMETABLE GRID */
.tt-wrap { overflow: auto; }
.tt-grid {
  border-collapse: collapse;
  min-width: 100%;
  font-size: 0.8rem;
}
.tt-grid th, .tt-grid td {
  border: 1px solid var(--border);
  padding: 0;
  min-width: 110px;
}
.tt-grid .tt-head { background: var(--bg3); padding: 8px; text-align: center; font-weight: 800; font-size: 0.72rem; letter-spacing: 0.5px; color: var(--text2); white-space: nowrap; }
.tt-grid .tt-row-head { background: var(--bg3); padding: 8px 10px; font-weight: 700; color: var(--text2); font-size: 0.75rem; white-space: nowrap; width: 80px; min-width: 80px; text-align: center; }
.tt-cell {
  min-height: 52px;
  padding: 4px;
  vertical-align: top;
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}
.tt-cell:hover { background: rgba(79,142,247,0.05); }
.tt-cell.locked { background: rgba(239,68,68,0.06); cursor: not-allowed; }
.tt-cell.locked::after { content: '🔒'; position: absolute; top: 2px; right: 3px; font-size: 0.65rem; }
.tt-cell.manual { background: rgba(124,92,252,0.07); }
.tt-entry {
  background: var(--bg3);
  border-radius: 5px;
  padding: 3px 6px;
  font-size: 0.75rem;
  font-weight: 700;
  border-left: 3px solid var(--accent);
  line-height: 1.35;
}
.tt-entry.manual-entry { border-left-color: var(--accent2); }
.tt-entry .lesson { color: var(--text); font-size: 0.72rem; }
.tt-entry .teacher { color: var(--text3); font-size: 0.68rem; }

/* AVAILABILITY GRID */
.avail-grid { border-collapse: collapse; width: 100%; }
.avail-grid th, .avail-grid td { border: 1px solid var(--border); text-align: center; }
.avail-grid th { padding: 7px 10px; font-size: 0.72rem; font-weight: 800; text-transform: uppercase; color: var(--text2); background: var(--bg3); }
.avail-grid td { width: 48px; min-width: 48px; height: 38px; }
.avail-cell {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 0.75rem;
  font-weight: 700;
  transition: all 0.1s;
}
.avail-cell.available { background: rgba(34,197,94,0.15); color: var(--success); }
.avail-cell.unavailable { background: rgba(239,68,68,0.1); color: var(--danger); }
.avail-cell:hover { opacity: 0.7; }

/* STATS */
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.stat-label { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); }
.stat-value { font-size: 1.8rem; font-weight: 900; font-family: var(--mono); line-height: 1; }
.stat-sub { font-size: 0.78rem; color: var(--text3); }

/* SETTINGS PAGE */
.settings-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 16px;
}
.settings-section h3 {
  font-size: 0.9rem;
  font-weight: 800;
  margin-bottom: 14px;
  color: var(--text);
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* CHIP */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 700;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.selected { background: rgba(79,142,247,0.15); border-color: var(--accent); color: var(--accent); }
.chip .chip-rm { color: var(--text3); margin-left: 2px; font-size: 1rem; line-height: 1; }
.chip .chip-rm:hover { color: var(--danger); }

/* PROGRESS */
.progress-bar {
  height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 6px;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 3px;
  transition: width 0.4s ease;
}
.progress-fill.warn { background: var(--warn); }
.progress-fill.danger { background: var(--danger); }

/* DRAG HANDLE */
.drag-handle { cursor: grab; color: var(--text3); font-size: 1rem; }
.drag-handle:active { cursor: grabbing; }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text3);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state h3 { font-size: 1rem; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
.empty-state p { font-size: 0.85rem; }

/* RESPONSIVE */
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }
  #sidebar {
    transform: translateX(-230px);
    width: 230px;
  }
  #sidebar.open { transform: translateX(0); }
  #main { margin-left: 0; }
  #menu-toggle { display: block; }
  #content { padding: 16px; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .modal { max-width: 100%; }
  .tt-grid th, .tt-grid td { min-width: 80px; }
  .btn-text-hide { display: none; }
}
@media (max-width: 480px) {
  #content { padding: 10px; }
  .card { padding: 14px; }
  #topbar { padding: 0 12px; }
}

/* SIDEBAR OVERLAY */
#sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 99;
}
#sidebar-overlay.show { display: block; }

/* Print */
@media print {
  #sidebar, #topbar, .no-print { display: none !important; }
  #main { margin-left: 0; }
  body { background: white; color: black; }
}

/* IMPORT WIZARD */
.col-map-row {
  display: grid;
  grid-template-columns: 1fr 24px 1fr;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.col-map-row .arrow { color: var(--text3); text-align: center; }

/* DISTRIBUTION SCREEN SPECIFICS */
.tt-legend { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
.tt-legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--text2); }
.tt-legend-dot { width: 10px; height: 10px; border-radius: 2px; }

/* CONFLICT PANEL */
.conflict-panel {
  background: rgba(239,68,68,0.05);
  border: 1px solid rgba(239,68,68,0.25);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-top: 12px;
}
.conflict-panel h4 { color: var(--danger); font-size: 0.82rem; font-weight: 800; margin-bottom: 8px; }
.conflict-item {
  font-size: 0.8rem;
  color: var(--text2);
  padding: 4px 0;
  border-bottom: 1px solid rgba(239,68,68,0.1);
  display: flex;
  align-items: flex-start;
  gap: 6px;
}
.conflict-item:last-child { border-bottom: none; }

/* SEARCH */
.search-box {
  position: relative;
  display: flex;
  align-items: center;
}
.search-box .icon { position: absolute; left: 10px; color: var(--text3); font-size: 0.9rem; pointer-events: none; }
.search-box input { padding-left: 30px; }

/* CHECKBOX */
.checkbox-group { display: flex; flex-direction: column; gap: 6px; }
.checkbox-item {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: 0.85rem;
  color: var(--text2);
}
.checkbox-item input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
.checkbox-item:hover { color: var(--text); }

/* RADIO */
.radio-group { display: flex; gap: 12px; flex-wrap: wrap; }
.radio-item { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.84rem; color: var(--text2); }
.radio-item input[type=radio] { accent-color: var(--accent); cursor: pointer; }

/* DIVIDER */
.divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

/* NUMBER INPUT */
.number-input { display: flex; align-items: center; gap: 0; }
.number-input button {
  width: 30px; height: 32px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s;
}
.number-input button:hover { background: var(--border); }
.number-input button:first-child { border-radius: var(--radius) 0 0 var(--radius); border-right: none; }
.number-input button:last-child { border-radius: 0 var(--radius) var(--radius) 0; border-left: none; }
.number-input input {
  width: 52px;
  text-align: center;
  border-radius: 0;
  border-left: none;
  border-right: none;
}

/* COLOR CODED SUBJECTS */
.subject-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

/* WEEK GROUP DISPLAY */
.day-group-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 0.75rem;
  font-weight: 700;
  font-family: var(--mono);
  color: var(--accent3);
}

/* LOADING SPINNER */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* INLINE HELP */
.help-text { font-size: 0.75rem; color: var(--text3); margin-top: 4px; }

/* BLOCK PATTERN DISPLAY */
.block-pattern {
  display: flex;
  gap: 3px;
  flex-wrap: wrap;
  margin-top: 4px;
}
.block-unit {
  background: var(--accent);
  border-radius: 3px;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  font-weight: 800;
  color: white;
}
.block-unit.b2 { background: var(--accent2); }
.block-unit.b3 { background: var(--accent3); color: #0f1117; }
.block-sep { width: 6px; display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 0.7rem; }
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR OVERLAY -->
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="logo">
      <div class="brand">S-DRRS</div>
      <div class="sub">Ders Dağıtım Sistemi</div>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">Genel</div>
      <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
        <span class="icon">📊</span> Gösterge Paneli
      </div>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">Tanımlamalar</div>
      <div class="nav-item" onclick="navigate('dersler')" id="nav-dersler">
        <span class="icon">📚</span> Dersler
        <span class="nav-badge" id="badge-dersler">0</span>
      </div>
      <div class="nav-item" onclick="navigate('siniflar')" id="nav-siniflar">
        <span class="icon">🏫</span> Sınıflar & Derslikler
        <span class="nav-badge" id="badge-siniflar">0</span>
      </div>
      <div class="nav-item" onclick="navigate('ogretmenler')" id="nav-ogretmenler">
        <span class="icon">👨‍🏫</span> Öğretmenler
        <span class="nav-badge" id="badge-ogretmenler">0</span>
      </div>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">Program</div>
      <div class="nav-item" onclick="navigate('dagilim')" id="nav-dagilim">
        <span class="icon">🗓️</span> Ders Dağıtımı
      </div>
      <div class="nav-item" onclick="navigate('programlar')" id="nav-programlar">
        <span class="icon">📋</span> Programlar
      </div>
      <div class="nav-item" onclick="navigate('raporlar')" id="nav-raporlar">
        <span class="icon">📄</span> Raporlar & Çarşaflar
      </div>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">Sistem</div>
      <div class="nav-item" onclick="navigate('ayarlar')" id="nav-ayarlar">
        <span class="icon">⚙️</span> Ayarlar
      </div>
      <div class="nav-item" onclick="navigate('yedek')" id="nav-yedek">
        <span class="icon">💾</span> Yedek & Geri Yükle
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="school-badge" onclick="navigate('ayarlar')">
        <div class="sname" id="school-name-badge">Okul Adı Girilmedi</div>
        <div class="syear" id="school-year-badge">2024-2025 Eğitim Öğretim Yılı</div>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="page-title" id="page-title">Gösterge Paneli</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- GLOBAL MODAL -->
<div class="modal-overlay" id="global-modal">
  <div class="modal" id="global-modal-box">
    <div class="modal-header">
      <div class="modal-title" id="gm-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="gm-body"></div>
    <div class="modal-footer" id="gm-footer"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════════════════════════
const STORAGE_KEY = 'sdrrs_v1';
let state = {
  settings: {
    schoolName: '',
    schoolYear: '2024-2025',
    principalName: '',
    principalTitle: 'Okul Müdürü',
    schoolType: 'ortaokul',
    weekDays: ['Pazartesi','Salı','Çarşamba','Perşembe','Cuma'],
    weekendDays: [],
    defaultDailyHours: 8,
    hourLabels: ['1.Ders','2.Ders','3.Ders','4.Ders','5.Ders','6.Ders','7.Ders','8.Ders'],
  },
  dersler: [],
  siniflar: [],
  derslikler: [],
  ogretmenler: [],
  program: {},  // { classId: { day: { hour: { lessonId, teacherId, manual, locked } } } }
  lastSaved: null
};

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    state.lastSaved = Date.now();
  } catch(e) { toast('Kayıt hatası: ' + e.message, 'error'); }
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = { ...state, ...parsed };
    }
  } catch(e) { toast('Yükleme hatası', 'error'); }
}

// ═══════════════════════════════════════════════════════════════
// UTILITY
// ═══════════════════════════════════════════════════════════════
function genId() { return '_' + Math.random().toString(36).substr(2,9); }
function slugify(s, n=5) { return (s||'').replace(/[^a-zA-ZğĞçÇşŞıİüÜöÖ]/g,'').substring(0,n).toUpperCase() || 'XXXXX'; }
function trSort(a, b) { return a.localeCompare(b, 'tr-TR'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

const COLORS = ['#4f8ef7','#7c5cfc','#2dd4a0','#f59e0b','#ef4444','#22c55e','#ec4899','#06b6d4','#84cc16','#f97316','#a855f7','#14b8a6'];
function getColor(index) { return COLORS[index % COLORS.length]; }

// ═══════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════
function toast(msg, type='info', duration=3500) {
  const icons = { success:'✅', error:'❌', warn:'⚠️', info:'ℹ️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]||'ℹ️'}</span> <span>${esc(msg)}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), duration);
}

// ═══════════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════════
function openModal(title, body, footer='', size='') {
  const box = document.getElementById('global-modal-box');
  box.className = 'modal' + (size?' '+size:'');
  document.getElementById('gm-title').innerHTML = title;
  document.getElementById('gm-body').innerHTML = body;
  document.getElementById('gm-footer').innerHTML = footer || '<button class="btn btn-ghost" onclick="closeModal()">Kapat</button>';
  document.getElementById('global-modal').classList.add('open');
}
function closeModal() { document.getElementById('global-modal').classList.remove('open'); }

function confirm(msg, onYes, onNo) {
  openModal('⚠️ Onay Gerekli',
    `<p style="font-size:.9rem;color:var(--text)">${esc(msg)}</p>`,
    `<button class="btn btn-ghost" onclick="closeModal();${onNo?'('+onNo+')()':''}">İptal</button>
     <button class="btn btn-danger" onclick="closeModal();(${onYes})()">Evet, Devam Et</button>`
  );
}

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
let currentPage = 'dashboard';
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-'+page);
  if (navEl) navEl.classList.add('active');
  document.getElementById('topbar-actions').innerHTML = '';
  closeSidebar();
  renderPage(page);
}

function renderPage(page) {
  const titles = {
    dashboard: 'Gösterge Paneli',
    dersler: 'Dersler',
    siniflar: 'Sınıflar & Derslikler',
    ogretmenler: 'Öğretmenler',
    dagilim: 'Ders Dağıtımı',
    programlar: 'Programlar',
    raporlar: 'Raporlar & Çarşaflar',
    ayarlar: 'Ayarlar',
    yedek: 'Yedek & Geri Yükle'
  };
  document.getElementById('page-title').textContent = titles[page] || page;
  const content = document.getElementById('content');
  switch(page) {
    case 'dashboard': content.innerHTML = renderDashboard(); break;
    case 'dersler': content.innerHTML = renderDersler(); bindDersler(); break;
    case 'siniflar': content.innerHTML = renderSiniflar(); bindSiniflar(); break;
    case 'ogretmenler': content.innerHTML = renderOgretmenler(); bindOgretmenler(); break;
    case 'dagilim': content.innerHTML = renderDagilim(); bindDagilim(); break;
    case 'programlar': content.innerHTML = renderProgramlar(); bindProgramlar(); break;
    case 'raporlar': content.innerHTML = renderRaporlar(); bindRaporlar(); break;
    case 'ayarlar': content.innerHTML = renderAyarlar(); bindAyarlar(); break;
    case 'yedek': content.innerHTML = renderYedek(); bindYedek(); break;
    default: content.innerHTML = `<div class="empty-state"><div class="icon">🚧</div><h3>Yakında</h3></div>`;
  }
  updateBadges();
}

function updateBadges() {
  document.getElementById('badge-dersler').textContent = state.dersler.length;
  document.getElementById('badge-siniflar').textContent = state.siniflar.length;
  document.getElementById('badge-ogretmenler').textContent = state.ogretmenler.length;
  const sb = document.getElementById('school-name-badge');
  const sy = document.getElementById('school-year-badge');
  if (sb) sb.textContent = state.settings.schoolName || 'Okul Adı Girilmedi';
  if (sy) sy.textContent = (state.settings.schoolYear||'2024-2025') + ' Eğitim Öğretim Yılı';
}

// ═══════════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════════
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

// ═══════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════
function renderDashboard() {
  const totalLessons = state.dersler.length;
  const totalClasses = state.siniflar.length;
  const totalTeachers = state.ogretmenler.length;
  let assignedCount = 0;
  Object.values(state.program).forEach(dayMap => {
    Object.values(dayMap).forEach(hourMap => {
      Object.values(hourMap).forEach(cell => { if(cell && cell.lessonId) assignedCount++; });
    });
  });
  return `
  <div class="grid-4 mb-16">
    <div class="stat-card">
      <div class="stat-label">Dersler</div>
      <div class="stat-value" style="color:var(--accent)">${totalLessons}</div>
      <div class="stat-sub">Tanımlı ders</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Sınıflar</div>
      <div class="stat-value" style="color:var(--accent2)">${totalClasses}</div>
      <div class="stat-sub">Aktif sınıf</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Öğretmenler</div>
      <div class="stat-value" style="color:var(--accent3)">${totalTeachers}</div>
      <div class="stat-sub">Kayıtlı öğretmen</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Yerleşen Ders</div>
      <div class="stat-value" style="color:var(--success)">${assignedCount}</div>
      <div class="stat-sub">Program hücresi</div>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-header">
        <div class="card-title">⚡ Hızlı Başlangıç</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div class="alert alert-info">📌 Başlamak için önce <strong>Ayarlar</strong> bölümünden okul bilgilerini girin.</div>
        <button class="btn btn-primary" onclick="navigate('ayarlar')">⚙️ Okul Ayarları</button>
        <button class="btn btn-ghost" onclick="navigate('dersler')">📚 Dersleri Tanımla</button>
        <button class="btn btn-ghost" onclick="navigate('siniflar')">🏫 Sınıfları Ekle</button>
        <button class="btn btn-ghost" onclick="navigate('ogretmenler')">👨‍🏫 Öğretmenleri Ekle</button>
        <button class="btn btn-success btn-lg" onclick="navigate('dagilim')">🗓️ Ders Dağıtımına Başla</button>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">📝 Son Aktivite</div>
      </div>
      ${state.lastSaved ? `<p style="font-size:.84rem;color:var(--text2)">Son kayıt: ${new Date(state.lastSaved).toLocaleString('tr-TR')}</p>` : `<div class="empty-state" style="padding:20px"><div class="icon" style="font-size:2rem">💤</div><p>Henüz işlem yapılmadı</p></div>`}
      <hr class="divider">
      <div class="card-header" style="margin-bottom:8px"><div class="card-title">🏫 ${esc(state.settings.schoolName || 'Okul Adı Girilmedi')}</div></div>
      <p style="font-size:.82rem;color:var(--text3)">${esc(state.settings.schoolYear||'2024-2025')} Eğitim Öğretim Yılı</p>
      ${state.settings.principalName ? `<p style="font-size:.82rem;color:var(--text3);margin-top:4px">Müdür: ${esc(state.settings.principalName)}</p>` : ''}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// DERSLER MODULE
// ═══════════════════════════════════════════════════════════════
function renderDersler() {
  const days = state.settings.weekDays.concat(state.settings.weekendDays || []);
  const sorted = [...state.dersler].sort((a,b) => trSort(a.ad, b.ad));
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="importData('dersler')">📥 İçe Aktar</button>
    <button class="btn btn-ghost btn-sm" onclick="exportDersler()">📤 Dışa Aktar</button>
    <button class="btn btn-primary btn-sm" onclick="openDersEkle()">＋ Ders Ekle</button>`;
  return `
  <div class="card">
    <div class="card-header">
      <div class="card-title">📚 Dersler (${state.dersler.length})</div>
      <div class="search-box">
        <span class="icon">🔍</span>
        <input class="form-control" id="ders-search" placeholder="Ders ara..." oninput="filterDersler()" style="width:200px">
      </div>
    </div>
    ${sorted.length === 0 ? `<div class="empty-state"><div class="icon">📚</div><h3>Ders Yok</h3><p>Henüz ders eklenmedi</p></div>` : `
    <div class="tbl-wrap">
      <table id="dersler-table">
        <thead><tr>
          <th>Kod</th><th>Ders Adı</th><th>Dağıtım Bloğu</th><th>Seviye-Saat</th><th>İşlemler</th>
        </tr></thead>
        <tbody>${sorted.map((d,i) => `
          <tr id="drow-${d.id}">
            <td><span class="badge badge-blue" style="font-family:var(--mono)">${esc(d.kod)}</span></td>
            <td style="font-weight:700">${esc(d.ad)}</td>
            <td>${renderBlockPattern(d.bloklar)}</td>
            <td style="font-size:.8rem;color:var(--text3)">${(d.seviyeSaat||[]).map(ss=>`<span class="day-group-tag">${esc(ss.seviye)}:${ss.saat}h</span>`).join(' ')}</td>
            <td>
              <button class="btn btn-ghost btn-sm btn-icon" onclick="editDers('${d.id}')" title="Düzenle">✏️</button>
              <button class="btn btn-ghost btn-sm btn-icon" onclick="deleteDers('${d.id}')" title="Sil">🗑️</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`}
  </div>`;
}

function renderBlockPattern(bloklar) {
  if (!bloklar || bloklar.length === 0) return '<span style="color:var(--text3)">—</span>';
  return `<div class="block-pattern">${bloklar.map((b,i) => {
    const cls = b >= 3 ? 'b3' : b >= 2 ? 'b2' : '';
    return (i>0?'<div class="block-sep">+</div>':'') + `<div class="block-unit ${cls}">${b}</div>`;
  }).join('')}</div>`;
}

function bindDersler() {}

function filterDersler() {
  const q = (document.getElementById('ders-search')?.value || '').toLowerCase();
  document.querySelectorAll('#dersler-table tbody tr').forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function openDersEkle(id) {
  const editing = id ? state.dersler.find(d => d.id === id) : null;
  const title = editing ? '✏️ Ders Düzenle' : '＋ Yeni Ders Ekle';

  const seviyeler = ['1.Sınıf','2.Sınıf','3.Sınıf','4.Sınıf','5.Sınıf','6.Sınıf','7.Sınıf','8.Sınıf','9.Sınıf','10.Sınıf','11.Sınıf','12.Sınıf','Hazırlık','Tüm Seviyeler'];
  const ssMapped = (editing?.seviyeSaat || []).map(ss => `${ss.seviye}:${ss.saat}`).join('\n');
  const blokStr = (editing?.bloklar || []).join('+');

  openModal(title, `
    <div class="form-group">
      <label class="form-label">Ders Adı *</label>
      <input class="form-control" id="ders-ad" value="${esc(editing?.ad||'')}" placeholder="Örn: Matematik">
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Ders Kodu (5 harf)</label>
        <input class="form-control" id="ders-kod" value="${esc(editing?.kod||'')}" placeholder="Otomatik" maxlength="5" style="font-family:var(--mono);text-transform:uppercase">
        <div class="help-text">Boş bırakılırsa ders adının ilk 5 harfi kullanılır</div>
      </div>
      <div class="form-group">
        <label class="form-label">Haftalık Blok Dağıtımı</label>
        <input class="form-control" id="ders-blok" value="${esc(blokStr)}" placeholder="Örn: 2+1+1 veya 3+2">
        <div class="help-text">Saatleri + ile ayırın. 2+1+1 = haftada 4 saat, 2'li+1'li+1'li blok</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Seviye-Saat Tanımları</label>
      <textarea class="form-control" id="ders-seviyesaat" rows="4" placeholder="Her satıra bir tanım:\n5.Sınıf:4\n6.Sınıf:3\nTüm Seviyeler:4">${ssMapped}</textarea>
      <div class="help-text">Her satır: Seviye:Haftalık_Saat (Örn: 5.Sınıf:4)</div>
    </div>
    <div class="form-group">
      <label class="form-label">İlk Saatlerde Yerleştir</label>
      <select class="form-control" id="ders-ilksaat">
        <option value="" ${!editing?.ilkSaat?'selected':''}>— Kısıtlama Yok —</option>
        <option value="1" ${editing?.ilkSaat==1?'selected':''}>İlk 4 saatte</option>
        <option value="2" ${editing?.ilkSaat==2?'selected':''}>İlk 5 saatte</option>
        <option value="3" ${editing?.ilkSaat==3?'selected':''}>Sadece sabah</option>
      </select>

  `);
}

function editDers(id) { openDersEkle(id); }

function saveDers(id) {
  const ad = document.getElementById('ders-ad').value.trim();
  if (!ad) { toast('Ders adı zorunludur', 'error'); return; }

  let kod = document.getElementById('ders-kod').value.trim().toUpperCase();
  if (!kod) kod = slugify(ad, 5);

  const blokStr = document.getElementById('ders-blok').value.trim();
  let bloklar = [];
  if (blokStr) {
    bloklar = blokStr.split('+').map(b => parseInt(b)).filter(b => !isNaN(b) && b > 0);
  }

  const ssLines = document.getElementById('ders-seviyesaat').value.trim().split('\n').filter(l => l.trim());
  const seviyeSaat = [];
  ssLines.forEach(line => {
    const parts = line.split(':');
    if (parts.length >= 2) {
      const saat = parseInt(parts[parts.length-1]);
      const seviye = parts.slice(0, parts.length-1).join(':').trim();
      if (seviye && !isNaN(saat)) seviyeSaat.push({ seviye, saat });
    }
  });

  const ilkSaat = document.getElementById('ders-ilksaat').value;

  if (id) {
    const idx = state.dersler.findIndex(d => d.id === id);
    if (idx >= 0) state.dersler[idx] = { ...state.dersler[idx], ad, kod, bloklar, seviyeSaat, ilkSaat };
    toast('Ders güncellendi', 'success');
  } else {
    state.dersler.push({ id: genId(), ad, kod, bloklar, seviyeSaat, ilkSaat });
    toast('Ders eklendi', 'success');
  }
  save();
  closeModal();
  navigate('dersler');
}

function deleteDers(id) {
  confirm('Bu dersi silmek istediğinizden emin misiniz?', function() {
    state.dersler = state.dersler.filter(d => d.id !== id);
    save();
    toast('Ders silindi', 'success');
    navigate('dersler');
  });
}

function exportDersler() {
  openExportModal('dersler', state.dersler.map(d => ({
    'Kod': d.kod, 'Ders Adı': d.ad, 'Blok Dağıtımı': (d.bloklar||[]).join('+'),
    'Seviye-Saat': (d.seviyeSaat||[]).map(ss=>ss.seviye+':'+ss.saat).join(' | ')
  })));
}

function updateSinifDersToplam() {
  let total = 0;
  state.dersler.forEach(d => {
    const chk = document.getElementById(`dck-${d.id}`);
    const inp = document.getElementById(`dsh-${d.id}`);
    if (chk?.checked && inp) total += parseInt(inp.value)||0;

  const el = document.getElementById('sinif-ders-toplam');
  if (el) el.textContent = total;
}

function saveSinifDersler(sinifId) {
  const sinif = state.siniflar.find(s => s.id === sinifId);
  if (!sinif) return;
  const dersler = [];
  state.dersler.forEach(d => {
    const chk = document.getElementById(`dck-${d.id}`);
    const inp = document.getElementById(`dsh-${d.id}`);
    if (chk?.checked) dersler.push({ dersId: d.id, saat: parseInt(inp?.value)||0 });
  });
  const total = dersler.reduce((a,b)=>a+b.saat,0);
  const beklenen = (sinif.gunlukSaat||8) * state.settings.weekDays.length;
  sinif.dersler = dersler;
  save(); closeModal();
  if (total > beklenen) toast(`⚠️ Fazla ders saati: ${total}/${beklenen}`, 'warn');
  else if (total < beklened) toast(`⚠️ Eksik ders saati: ${total}/${beklenen}`, 'warn');

  navigate('siniflar');
}

function deleteOgretmen(id) {

    save(); toast('Öğretmen silindi','success'); navigate('ogretmenler');

}

function ogretmenDersAta(ogretmenId) {
  const ogr = state.ogretmenler.find(o=>o.id===ogretmenId);
  if (!ogr) return;
  const sortedDers = [...state.dersler].sort((a,b)=>trSort(a.ad,b.ad));
  const sortedSinif = [...state.siniflar].sort((a,b)=>trSort(a.ad,b.ad));
  openModal(`📚 ${esc(ogr.ad)} — Ders Atama`, `
    <div class="alert alert-info mb-12">Önce dersi seçin, ardından o dersin girileceği sınıfları seçin ve kaydedin</div>
    <div class="form-group">
      <label class="form-label">Ders Seç</label>
      <select class="form-control" id="oda-ders" onchange="updateOgrSinifler('${ogretmenId}')">
        <option value="">— Ders Seçin —</option>
        ${sortedDers.map(d=>`<option value="${d.id}">${esc(d.ad)} (${esc(d.kod)})</option>`).join('')}
      </select>
    </div>
    <div id="oda-siniflar-wrap" style="display:none">
      <label class="form-label mb-8">Sınıfları Seç</label>
      <div class="flex gap-8 mb-8"><button class="btn btn-ghost btn-sm" onclick="toggleAllCheck('oda-s-')">Tümü</button></div>
      <div style="max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:4px" id="oda-siniflar">
      </div>
    </div>
    <hr class="divider">
    <div>
      <label class="form-label">Atanmış Dersler</label>
      <div id="oda-atanmis">${renderOgrAtanmis(ogr)}</div>
    </div>
  `, `
    <button class="btn btn-ghost" onclick="closeModal()">Kapat</button>
    <button class="btn btn-primary" onclick="saveOgrDers('${ogretmenId}')">➕ Ekle</button>
  `, 'modal-lg');
}

function renderOgrAtanmis(ogr) {
  if (!(ogr.dersAtamalari||[]).length) return '<p style="color:var(--text3);font-size:.84rem">Henüz atama yok</p>';
  return `<div style="display:flex;flex-direction:column;gap:4px">${(ogr.dersAtamalari||[]).map((da,i)=>{
    const d = state.dersler.find(x=>x.id===da.dersId);
    const sinifAdlari = (da.siniflar||[]).map(sid=>{const s=state.siniflar.find(x=>x.id===sid); return s?.ad||'?';});
    return `<div class="flex items-center gap-8" style="padding:5px 8px;background:var(--bg3);border-radius:6px">
      <span class="badge badge-blue">${esc(d?.kod||'?')}</span>
      <span style="flex:1;font-size:.84rem;font-weight:600">${esc(d?.ad||'Silinmiş Ders')}</span>
      <span style="font-size:.78rem;color:var(--text3)">${sinifAdlari.join(', ')}</span>
      <button class="btn btn-ghost btn-sm btn-icon" onclick="removeOgrDers('${ogr.id}',${i})">✕</button>
    </div>`;
  }).join('')}</div>`;
}

function updateOgrSinifler(ogretmenId) {
  const dersId = document.getElementById('oda-ders').value;
  const wrap = document.getElementById('oda-siniflar-wrap');
  const cont = document.getElementById('oda-siniflar');
  if (!dersId) { wrap.style.display='none'; return; }
  wrap.style.display='';
  const ogr = state.ogretmenler.find(o=>o.id===ogretmenId);
  const existing = (ogr?.dersAtamalari||[]).find(da=>da.dersId===dersId)?.siniflar||[];
  const sorted = [...state.siniflar].sort((a,b)=>trSort(a.ad,b.ad));
  cont.innerHTML = sorted.map(s=>`<label class="checkbox-item">
    <input type="checkbox" id="oda-s-${s.id}" ${existing.includes(s.id)?'checked':''}>
    <span>${esc(s.ad)}</span>
  </label>`).join('');
}

function saveOgrDers(ogretmenId) {
  const dersId = document.getElementById('oda-ders').value;
  if (!dersId) { toast('Ders seçin','warn'); return; }
  const siniflar = state.siniflar.filter(s=>document.getElementById(`oda-s-${s.id}`)?.checked).map(s=>s.id);
  const ogr = state.ogretmenler.find(o=>o.id===ogretmenId);
  if (!ogr) return;
  const idx = (ogr.dersAtamalari||[]).findIndex(da=>da.dersId===dersId);
  if (!ogr.dersAtamalari) ogr.dersAtamalari = [];
  if (idx>=0) ogr.dersAtamalari[idx].siniflar = siniflar;
  else ogr.dersAtamalari.push({dersId, siniflar});
  save();
  document.getElementById('oda-atanmis').innerHTML = renderOgrAtanmis(ogr);
  toast('Ders atandı','success');
}

function removeOgrDers(ogretmenId, idx) {
  const ogr = state.ogretmenler.find(o=>o.id===ogretmenId);
  if (!ogr) return;
  ogr.dersAtamalari.splice(idx,1);
  save();
  document.getElementById('oda-atanmis').innerHTML = renderOgrAtanmis(ogr);
  toast('Atama kaldırıldı','success');
}

function ogretmenMüsaitlik(ogretmenId) {
  const ogr = state.ogretmenler.find(o=>o.id===ogretmenId);
  if (!ogr) return;
  openMüsaitlikModal('ogretmen', ogr);
}

function openMüsaitlikModal(tip, entity) {
  const days = state.settings.weekDays.concat(state.settings.weekendDays||[]);
  const maxSaat = state.settings.defaultDailyHours || 8;
  const musaitlik = entity.musaitlik || {};

  const tableRows = Array.from({length:maxSaat},(_,hi)=>`
    <tr>
      <td style="background:var(--bg3);padding:6px 10px;font-size:.75rem;font-weight:700;color:var(--text2);text-align:center;border:1px solid var(--border);white-space:nowrap">
        ${state.settings.hourLabels?.[hi]||((hi+1)+'.Ders')}
      </td>
      ${days.map(day=>{
        const key = day+'_'+hi;
        const avail = musaitlik[key] !== false;
        return `<td style="border:1px solid var(--border);padding:0;width:50px;min-width:50px;height:36px">
          <div class="avail-cell ${avail?'available':'unavailable'}" onclick="toggleMusaitlik(this,'${esc(entity.id)}','${esc(day)}',${hi},'${tip}')">
            ${avail?'✓':'✕'}
          </div></td>`;
      }).join('')}
    </tr>`).join('');

  openModal(`🗓️ ${esc(entity.ad||entity.sinifSeviye+(entity.sube||''))} — Müsaitlik Tablosu`, `
    <div class="flex gap-8 mb-12 flex-wrap">
      <button class="btn btn-success btn-sm" onclick="setAllMusaitlik('${entity.id}','${tip}',true)">✅ Tümü Müsait</button>
      <button class="btn btn-danger btn-sm" onclick="setAllMusaitlik('${entity.id}','${tip}',false)">🚫 Tümü Müsait Değil</button>
      <button class="btn btn-ghost btn-sm" onclick="copyMusaitlikToOthers('${entity.id}','${tip}')">📋 Diğerlerine Aktar</button>
    </div>
    <div style="overflow-x:auto">
      <table class="avail-grid">
        <thead><tr>
          <th>Saat</th>
          ${days.map(d=>`<th>${esc(d)}</th>`).join('')}
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    <div class="help-text mt-8">✓ Müsait (yeşil) | ✕ Müsait Değil (kırmızı)</div>
  `, `<button class="btn btn-primary" onclick="closeModal()">✅ Tamam</button>`, 'modal-lg');
}

function toggleMusaitlik(el, entityId, day, hourIdx, tip) {
  const entities = tip === 'ogretmen' ? state.ogretmenler : state.siniflar;
  const entity = entities.find(e=>e.id===entityId);
  if (!entity) return;
  if (!entity.musaitlik) entity.musaitlik = {};
  const key = day+'_'+hourIdx;
  const current = entity.musaitlik[key] !== false;
  entity.musaitlik[key] = !current;
  el.className = 'avail-cell ' + (!current?'available':'unavailable');
  el.textContent = !current?'✓':'✕';
  save();
}

function setAllMusaitlik(entityId, tip, val) {
  const entities = tip === 'ogretmen' ? state.ogretmenler : state.siniflar;
  const entity = entities.find(e=>e.id===entityId);
  if (!entity) return;
  const days = state.settings.weekDays.concat(state.settings.weekendDays||[]);
  const maxSaat = state.settings.defaultDailyHours || 8;
  if (!entity.musaitlik) entity.musaitlik = {};
  days.forEach(day => {
    for (let h=0; h<maxSaat; h++) entity.musaitlik[day+'_'+h] = val;
  });
  save();
  document.querySelectorAll('.avail-cell').forEach(el=>{
    el.className = 'avail-cell ' + (val?'available':'unavailable');
    el.textContent = val?'✓':'✕';
  });
}

function copyMusaitlikToOthers(entityId, tip) {
  const entities = tip === 'ogretmen' ? state.ogretmenler : state.siniflar;
  const source = entities.find(e=>e.id===entityId);
  if (!source) return;
  openModal('📋 Müsaitlik Aktarımı', `
    <div class="alert alert-info mb-12">"${esc(source.ad||source.sinifSeviye)}" müsaitlik tablosunu kimlerine aktarmak istiyorsunuz?</div>
    <div class="flex gap-8 mb-8"><button class="btn btn-ghost btn-sm" onclick="toggleAllCheck('cmat-')">Tümü</button></div>
    <div style="max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:4px">
      ${entities.filter(e=>e.id!==entityId).sort((a,b)=>trSort(a.ad||a.sinifSeviye,b.ad||b.sinifSeviye)).map(e=>`
        <label class="checkbox-item"><input type="checkbox" id="cmat-${e.id}"><span>${esc(e.ad||e.sinifSeviye+(e.sube||''))}</span></label>`).join('')}
    </div>
  `, `
    <button class="btn btn-ghost" onclick="closeModal()">İptal</button>
    <button class="btn btn-primary" onclick="applyMusaitlikKopya('${entityId}','${tip}')">✅ Aktar</button>
  `);
}

function applyMusaitlikKopya(sourceId, tip) {
  const entities = tip==='ogretmen'?state.ogretmenler:state.siniflar;
  const source = entities.find(e=>e.id===sourceId);
  entities.filter(e=>e.id!==sourceId).forEach(e=>{
    if(document.getElementById(`cmat-${e.id}`)?.checked) e.musaitlik = {...(source?.musaitlik||{})};
  });
  save(); closeModal(); toast('Müsaitlik aktarıldı','success');
}

          <label class="checkbox-item"><input type="checkbox" id="oa-bosluk-aktif" ${oa.maxBosluk!==undefined?'checked':''}> Aktif</label>

          <label class="checkbox-item"><input type="checkbox" id="oa-maksgün-aktif" ${oa.maxGun!==undefined?'checked':''}> Aktif</label>
          <div class="number-input">

}
let _oaYasliGunler = [];
function toggleOADay(dayKey, dayFull) {
  if (!window._oaYasliGunler) window._oaYasliGunler = [];
  const idx = window._oaYasliGunler.indexOf(dayFull);
  if (idx>=0) window._oaYasliGunler.splice(idx,1);

function adjNum(id, delta) {

}
function saveOzelAyar(ogretmenId) {
  const ogr = state.ogretmenler.find(o=>o.id===ogretmenId);
  if (!ogr) return;
  ogr.ozelAyarlar = {};
  if ((window._oaYasliGunler||[]).length) ogr.ozelAyarlar.yasliGunler = [...window._oaYasliGunler];
  if (document.getElementById('oa-bosluk-aktif')?.checked) ogr.ozelAyarlar.maxBosluk = parseInt(document.getElementById('oa-bosluk-val').value)||1;
  if (document.getElementById('oa-maksgün-aktif')?.checked) ogr.ozelAyarlar.maxGun = parseInt(document.getElementById('oa-maksgün-val').value)||3;
  if (document.getElementById('oa-ilksaat-aktif')?.checked) ogr.ozelAyarlar.ilkSaatsinir = parseInt(document.getElementById('oa-ilksaat-val').value)||4;
  save(); closeModal(); toast('Özel ayarlar kaydedildi','success'); navigate('ogretmenler');
}
function copyOzelAyarToOthers(ogretmenId) {

function applyOzelAyarKopya(sourceId) {

let selectedView = null;

function getDagilimStatus(entityId, mode) {
  // count filled cells
  let filled = 0;
  if (mode === 'sinif') {
    const days = state.settings.weekDays.concat(state.settings.weekendDays||[]);
    const sinif = state.siniflar.find(s=>s.id===entityId);
    const total = (sinif?.gunlukSaat||8) * days.length;
    days.forEach(day => {
      for(let h=0; h<(sinif?.gunlukSaat||8); h++) {
        const cell = state.program[entityId]?.[day]?.[h];
        if(cell?.lessonId) filled++;
      }
    });
    return `${filled}/${total}`;
  }
  return '';
}

function renderDagilimTable(entityId, mode) {
  const days = state.settings.weekDays.concat(state.settings.weekendDays||[]);
  const maxSaat = state.settings.defaultDailyHours||8;

  let entity = mode==='sinif' ? state.siniflar.find(s=>s.id===entityId) : state.ogretmenler.find(o=>o.id===entityId);
  if (!entity) return '<p style="color:var(--text3)">Seçim geçersiz</p>';

  const entitySaat = entity.gunlukSaat||maxSaat;

  return `
  <div class="card-header" style="margin-bottom:10px">
    <div class="card-title">${mode==='sinif'?'🏫':'👨‍🏫'} ${esc(entity.ad||entity.sinifSeviye+(entity.sube||''))}</div>
    <div class="flex gap-8">

    <div class="tt-legend-item"><div class="tt-legend-dot" style="background:rgba(239,68,68,0.4)"></div>Kilitli</div>
  </div>
  <div class="tt-wrap">
    <table class="tt-grid">
      <thead><tr>
        <th class="tt-head" style="min-width:70px">Saat</th>
        ${days.map(d=>`<th class="tt-head">${esc(d)}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${Array.from({length:entitySaat},(_,hi)=>`
          <tr>
            <td class="tt-row-head">${state.settings.hourLabels?.[hi]||(hi+1)+'.Ders'}</td>
            ${days.map(day=>{
              const prog = state.program[entityId]?.[day]?.[hi];
              const locked = prog?.locked;
              const manual = prog?.manual;
              let content = '';
              if (prog?.lessonId) {
                const ders = state.dersler.find(d=>d.id===prog.lessonId);
                let secondLine = '';
                if (mode==='sinif') {
                  const ogr = state.ogretmenler.find(o=>o.id===prog.teacherId);
                  secondLine = ogr?.ad||'';
                } else {
                  const sinif = state.siniflar.find(s=>s.id===prog.classId);
                  secondLine = sinif?.ad||'';
                }
                content = `<div class="tt-entry ${manual?'manual-entry':''}">
                  <div class="lesson">${esc(ders?.kod||'?')} ${esc(ders?.ad||'?')}</div>

                ${content}
              </td>`;
            }).join('')}

    </table>
  </div>`;
}

function renderYerlesimRapor() {
  const total = (state.siniflar||[]).reduce((acc,s)=>{
    return acc + (s.dersler||[]).reduce((a,b)=>a+b.saat,0);
  },0);
  let placed = 0;
  Object.values(state.program).forEach(dayMap=>{
    Object.values(dayMap).forEach(hourMap=>{
      Object.values(hourMap).forEach(cell=>{ if(cell?.lessonId) placed++; });
    });
  });
  const pct = total>0?Math.round(placed/total*100):0;
  return `
    <div>Toplam: <strong>${total}</strong> ders saati</div>
    <div>Yerleşen: <strong style="color:var(--success)">${placed}</strong></div>
    <div>Yerleşmeyen: <strong style="color:var(--danger)">${total-placed}</strong></div>
    <div class="progress-bar mt-8"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="font-size:.75rem;margin-top:4px;color:var(--text3)">%${pct} tamamlandı</div>`;
}

function bindDagilim() {}
function setDagilimMode(mode, el) {

  selectedView = null;
  navigate('dagilim');
}
function selectDagilimView(id, mode) {
  selectedView = id;

  navigate('dagilim');
}

function openCellEdit(entityId, day, hourIdx, mode) {
  const days = state.settings.weekDays.concat(state.settings.weekendDays||[]);

  let dersOptions = '', sinifOptions = '', ogretmenOptions = '';

  if (mode === 'sinif') {
    const sinif = state.siniflar.find(s=>s.id===entityId);

    dersOptions = `<option value="">— Boş —</option>${dersler.map(d=>`<option value="${d.id}" ${prog?.lessonId===d.id?'selected':''}>${esc(d.ad)} (${esc(d.kod)})</option>`).join('')}`;

    const availTeachers = state.ogretmenler.filter(o=>(o.dersAtamalari||[]).some(da=>da.siniflar?.includes(entityId)));
    ogretmenOptions = `<option value="">— Öğretmen Seçin —</option>${availTeachers.sort((a,b)=>trSort(a.ad,b.ad)).map(o=>`<option value="${o.id}" ${prog?.teacherId===o.id?'selected':''}>${esc(o.ad)}</option>`).join('')}`;
  } else {
    const ogr = state.ogretmenler.find(o=>o.id===entityId);
    const dersler = [...state.dersler].filter(d=>(ogr?.dersAtamalari||[]).find(da=>da.dersId===d.id)).sort((a,b)=>trSort(a.ad,b.ad));
    dersOptions = `<option value="">— Boş —</option>${dersler.map(d=>`<option value="${d.id}" ${prog?.lessonId===d.id?'selected':''}>${esc(d.ad)} (${esc(d.kod)})</option>`).join('')}`;

    sinifOptions = `<option value="">— Sınıf Seçin —</option>`;

  }

  openModal(`✏️ Hücre Düzenle — ${esc(day)} ${esc(hourLabel)}`, `

      <select class="form-control" id="ce-ders" onchange="updateCellSinifler('${entityId}','${mode}')">${dersOptions}</select></div>
    ${mode==='sinif' ? `<div class="form-group"><label class="form-label">Öğretmen</label>
      <select class="form-control" id="ce-ogretmen">${ogretmenOptions}</select></div>` : `

      <select class="form-control" id="ce-sinif">${sinifOptions}</select></div>`}
    <div class="form-group">
      <label class="checkbox-item"><input type="checkbox" id="ce-locked" ${prog?.locked?'checked':''}> Bu hücreyi kilitle (otomatik dağıtım değiştirmesin)</label>

    <button class="btn btn-primary" onclick="saveCell('${entityId}','${day}',${hourIdx},'${mode}')">💾 Kaydet</button>
  `);
}

function updateCellSinifler(entityId, mode) {
  if (mode !== 'ogretmen') return;
  const dersId = document.getElementById('ce-ders').value;
  const ogr = state.ogretmenler.find(o=>o.id===entityId);
  const da = (ogr?.dersAtamalari||[]).find(x=>x.dersId===dersId);
  const siniflar = da?.siniflar||[];
  const sel = document.getElementById('ce-sinif');
  if (!sel) return;
  sel.innerHTML = `<option value="">— Sınıf Seçin —</option>` +
    siniflar.map(sid=>{const s=state.siniflar.find(x=>x.id===sid);return`<option value="${sid}">${esc(s?.ad||'?')}</option>`;}).join('');
}

function saveCell(entityId, day, hourIdx, mode) {
  const dersId = document.getElementById('ce-ders').value;
  const locked = document.getElementById('ce-locked').checked;
  const teacherId = mode==='sinif' ? (document.getElementById('ce-ogretmen')?.value||'') : entityId;
  const classId = mode==='ogretmen' ? (document.getElementById('ce-sinif')?.value||'') : entityId;

  if (!state.program[entityId]) state.program[entityId] = {};
  if (!state.program[entityId][day]) state.program[entityId][day] = {};

  if (!dersId) {
    delete state.program[entityId][day][hourIdx];
  } else {
    state.program[entityId][day][hourIdx] = { lessonId: dersId, teacherId, classId, manual: true, locked };
    // sync to teacher side
    if (mode==='sinif' && teacherId && classId) {
      if (!state.program[teacherId]) state.program[teacherId] = {};
      if (!state.program[teacherId][day]) state.program[teacherId][day] = {};
      state.program[teacherId][day][hourIdx] = { lessonId: dersId, teacherId, classId, manual: true, locked };
    }
  }
  save(); closeModal(); navigate('dagilim');
}

function clearCell(entityId, day, hourIdx, mode) {
  if (state.program[entityId]?.[day]) delete state.program[entityId][day][hourIdx];
  save(); closeModal(); navigate('dagilim');
}

function temizleTablo(entityId, mode) {
  confirm('Kilitli olmayan tüm hücreler temizlenecek. Devam?', function() {
    if (!state.program[entityId]) return;
    const days = state.settings.weekDays.concat(state.settings.weekendDays||[]);
    days.forEach(day=>{
      if (!state.program[entityId][day]) return;
      Object.keys(state.program[entityId][day]).forEach(h=>{
        if(!state.program[entityId][day][h]?.locked) delete state.program[entityId][day][h];
      });
    });
    save(); toast('Tablo temizlendi','success'); navigate('dagilim');
  });
}

function kilitleTablo(entityId, mode) {
  if (!state.program[entityId]) { toast('Tabloda veri yok','warn'); return; }
  const days = state.settings.weekDays.concat(state.settings.weekendDays||[]);
  days.forEach(day=>{
    if(!state.program[entityId][day]) return;
    Object.keys(state.program[entityId][day]).forEach(h=>{
      if(state.program[entityId][day][h]) state.program[entityId][day][h].locked = true;
    });
  });
  save(); toast('Tablo kilitlendi','success'); navigate('dagilim');
}

function clearDagilim() {
  confirm('Tüm program silinecek (kilitli hücreler dahil). Emin misiniz?', function() {
    state.program = {};
    save(); toast('Program temizlendi','success'); navigate('dagilim');
  });
}

function otomatikDagit() {
  if (!state.siniflar.length) { toast('Önce sınıf ekleyin','warn'); return; }
  if (!state.ogretmenler.length) { toast('Önce öğretmen ekleyin','warn'); return; }
  if (!state.dersler.length) { toast('Önce ders ekleyin','warn'); return; }

  openModal('🤖 Otomatik Dağıtım', `
    <div class="alert alert-info mb-12">Kilitli hücreler korunarak program otomatik dağıtılacak.</div>
    <div class="form-group">
      <label class="form-label">Dağıtım Stratejisi</label>
      <select class="form-control" id="dist-strateji">
        <option value="balanced">Dengeli Dağılım (Önerilen)</option>
        <option value="compact">Sıkıştırılmış (Boşlukları Azalt)</option>
        <option value="morning">Sabah Ağırlıklı</option>
      </select>
    </div>
    <div class="form-group">
      <label class="checkbox-item"><input type="checkbox" id="dist-blok" checked> Blok dersleri birlikte yerleştir (2+1+1 vb.)</label>
    </div>
    <div class="form-group">
      <label class="checkbox-item"><input type="checkbox" id="dist-musait" checked> Öğretmen müsaitliğini dikkate al</label>
    </div>
    <div class="form-group">
      <label class="checkbox-item"><input type="checkbox" id="dist-ozel" checked> Öğretmen özel ayarlarını uygula</label>
    </div>
    <div id="dist-progress" style="display:none">
      <div class="progress-bar mt-12"><div class="progress-fill" id="dist-pbar" style="width:0%"></div></div>
      <p style="font-size:.8rem;color:var(--text3);margin-top:6px" id="dist-status">Dağıtılıyor...</p>
    </div>
  `, `
    <button class="btn btn-ghost" onclick="closeModal()">İptal</button>
    <button class="btn btn-warn btn-lg" onclick="startOtomatikDagitim()">🚀 Dağıtımı Başlat</button>
  `);
}

function startOtomatikDagitim() {
  document.getElementById('dist-progress').style.display = '';
  const strateji = document.getElementById('dist-strateji').value;
  const useBlok = document.getElementById('dist-blok').checked;
  const useMusait = document.getElementById('dist-musait').checked;
  const useOzel = document.getElementById('dist-ozel').checked;

  // Simulate distribution algorithm
  let progress = 0;
  const days = state.settings.weekDays.concat(state.settings.weekendDays||[]);
  const conflicts = [];
  let placed = 0;
  let failed = [];

  const pbar = document.getElementById('dist-pbar');
  const status = document.getElementById('dist-status');

  // Simple greedy algorithm
  const assign = () => {
    state.siniflar.forEach(sinif => {
      if (!state.program[sinif.id]) state.program[sinif.id] = {};
      const sinifSaat = sinif.gunlukSaat || state.settings.defaultDailyHours || 8;

      (sinif.dersler||[]).forEach(sd => {
        const ders = state.dersler.find(d=>d.id===sd.dersId);
        if (!ders) return;

        // find eligible teachers
        const teachers = state.ogretmenler.filter(o=>(o.dersAtamalari||[]).some(da=>da.dersId===ders.id && da.siniflar?.includes(sinif.id)));

        let remaining = sd.saat;
        const bloklar = (ders.bloklar||[]).length ? [...ders.bloklar] : Array(remaining).fill(1);

        bloklar.forEach(blokSize => {
          for (let di=0; di<days.length && remaining>0; di++) {
            const day = days[di];
            if (!state.program[sinif.id][day]) state.program[sinif.id][day] = {};

            // try placing blokSize consecutive hours
            for (let h=0; h<=sinifSaat-blokSize; h++) {
              // check all blok slots free
              let canPlace = true;
              for (let b=0; b<blokSize; b++) {
                const cell = state.program[sinif.id][day][h+b];
                if (cell?.lessonId || cell?.locked) { canPlace=false; break; }
              }
              if (!canPlace) continue;

              // find available teacher
              const teacher = teachers.find(t=>{
                if (!t) return false;
                for(let b=0;b<blokSize;b++) {
                  const tprog = state.program[t.id]?.[day]?.[h+b];
                  if(tprog?.lessonId) return false;
                  // check musaitlik
                  if(useMusait && t.musaitlik) {
                    if(t.musaitlik[day+'_'+(h+b)]===false) return false;
                  }
                  // check yasli günler
                  if(useOzel && t.ozelAyarlar?.yasliGunler?.includes(day)) return false;
                }
                return true;
              });

              if (!teacher && teachers.length) {
                // place without teacher
              }

              for (let b=0; b<blokSize; b++) {
                const cell = state.program[sinif.id][day][h+b];
                if (cell?.locked) continue;
                state.program[sinif.id][day][h+b] = {
                  lessonId: ders.id,
                  teacherId: teacher?.id||'',
                  classId: sinif.id,
                  manual: false,
                  locked: false
                };
                if (teacher) {
                  if (!state.program[teacher.id]) state.program[teacher.id] = {};
                  if (!state.program[teacher.id][day]) state.program[teacher.id][day] = {};
                  if (!state.program[teacher.id][day][h+b]?.locked) {
                    state.program[teacher.id][day][h+b] = {
                      lessonId: ders.id, teacherId: teacher.id, classId: sinif.id, manual: false, locked: false
                    };
                  }
                }
                placed++;
              }
              remaining -= blokSize;
              break;
            }
            if (remaining <= 0) break;
          }
          if (remaining > 0) {
            failed.push(`${sinif.ad} - ${ders.ad}: ${remaining} saat yerleştirilemedi`);
          }
        });
      });
    });
  };

  // Animate progress
  let step = 0;
  const steps = ['Sınıflar analiz ediliyor...', 'Öğretmen müsaitlikleri kontrol ediliyor...', 'Bloklar hesaplanıyor...', 'Program yerleştiriliyor...', 'Çakışmalar çözülüyor...', 'Tamamlandı!'];
  const interval = setInterval(()=>{
    step++;
    progress = Math.min(100, step * 20);
    pbar.style.width = progress + '%';
    status.textContent = steps[Math.min(step-1, steps.length-1)];
    if (progress >= 100) {
      clearInterval(interval);
      assign();
      save();
      closeModal();
      if (failed.length) {
        openModal('⚠️ Dağıtım Tamamlandı — Sorunlar Var', `
          <div class="alert alert-warn mb-12">${placed} ders saati yerleştirildi. ${failed.length} sorun var.</div>
          <div class="conflict-panel">
            <h4>Yerleştirilemeyen Dersler</h4>
            ${failed.map(f=>`<div class="conflict-item">⚠️ ${esc(f)}</div>`).join('')}
          </div>
          <hr class="divider">
          <p style="font-size:.82rem;color:var(--text2)">💡 <strong>Öneriler:</strong> Müsaitlik tablolarını genişletin, kilitleri kontrol edin veya blok ayarlarını değiştirin.</p>
        `, `<button class="btn btn-primary" onclick="closeModal()">Tamam</button>`);
      } else {
        toast(`✅ Dağıtım tamamlandı! ${placed} ders saati yerleştirildi.`, 'success', 4000);
      }
      navigate('dagilim');
    }
  }, 300);
}

function exportProgram(mode, id, fmt) {
  const entity = mode==='sinif'?state.siniflar.find(s=>s.id===id):state.ogretmenler.find(o=>o.id===id);
  if (!entity) { toast('Seçim geçersiz','error'); return; }
  const days = state.settings.weekDays.concat(state.settings.weekendDays||[]);
  const maxSaat = entity.gunlukSaat||state.settings.defaultDailyHours||8;
  const rows = Array.from({length:maxSaat},(_,hi)=>{
    const row = { 'Saat': state.settings.hourLabels?.[hi]||(hi+1)+'.Ders' };
    days.forEach(day=>{
      const prog = state.program[id]?.[day]?.[hi];
      if (prog?.lessonId) {
        const ders = state.dersler.find(d=>d.id===prog.lessonId);
        row[day] = mode==='sinif'
          ? (ders?.kod||'?') + ' ' + (state.ogretmenler.find(o=>o.id===prog.teacherId)?.ad||'')
          : (ders?.kod||'?') + ' ' + (state.siniflar.find(s=>s.id===prog.classId)?.ad||'');
      } else row[day] = '';
    });
    return row;
  });
  if (fmt==='csv') downloadCSV(rows, (entity.ad||entity.sinifSeviye)+'_program');
  else if (fmt==='xlsx') downloadXLSX(rows, (entity.ad||entity.sinifSeviye)+'_program');
  else if (fmt==='pdf') exportProgramPDF(mode, id);
}

function exportProgramPDF(mode, id) {
  toast('PDF oluşturuluyor...','info');
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
    const entity = mode==='sinif'?state.siniflar.find(s=>s.id===id):state.ogretmenler.find(o=>o.id===id);
    const days = state.settings.weekDays.concat(state.settings.weekendDays||[]);
    const maxSaat = entity?.gunlukSaat||state.settings.defaultDailyHours||8;
    const title = state.settings.schoolName + ' — ' + (entity?.ad||entity?.sinifSeviye+entity?.sube||'') + ' Programı';
    doc.setFontSize(12); doc.text(title, 14, 15);
    doc.setFontSize(9); doc.text(state.settings.schoolYear+' Eğitim Öğretim Yılı', 14, 22);
    const head = [['Saat',...days]];
    const body = Array.from({length:maxSaat},(_,hi)=>[
      state.settings.hourLabels?.[hi]||(hi+1)+'.Ders',
      ...days.map(day=>{
        const prog = state.program[id]?.[day]?.[hi];
        if(prog?.lessonId){const d=state.dersler.find(x=>x.id===prog.lessonId);return d?.kod||'?';}
        return '';
      })
    ]);
    doc.autoTable({ head, body, startY:26, styles:{fontSize:8}, headStyles:{fillColor:[31,37,55]} });
    doc.save((entity?.ad||'program')+'.pdf');
  } catch(e) { toast('PDF hatası: '+e.message,'error'); }
}
