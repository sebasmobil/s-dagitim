            <option value="ortaokul" ${s.schoolType==='ortaokul'?'selected':''}>Ortaokul</option>
            <option value="lise" ${s.schoolType==='lise'?'selected':''}>Lise</option>
            <option value="universite" ${s.schoolType==='universite'?'selected':''}>Üniversite</option>
          </select></div>
      </div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Müdür Adı Soyadı</label>
          <input class="form-control" id="set-principal" value="${esc(s.principalName||'')}"></div>
        <div class="form-group"><label class="form-label">Müdür Ünvanı</label>
          <input class="form-control" id="set-prtitle" value="${esc(s.principalTitle||'Okul Müdürü')}"></div>
      </div>
    </div>
    <div class="settings-section">
      <h3>📅 Haftalık Program Günleri</h3>
      <div class="flex gap-8 flex-wrap mb-8">
        ${allDays.map(d=>`<label class="chip ${s.weekDays.includes(d)||((s.weekendDays||[]).includes(d))?'selected':''}" id="daychip-${d.replace(/\s/g,'')}" onclick="toggleDay('${d}')">
          ${esc(d)}
        </label>`).join('')}
      </div>
      <div class="help-text">Seçili günler programa dahil edilir</div>
    </div>
    <div class="settings-section">
      <h3>⏰ Günlük Ders Saati Varsayılanı</h3>
      <div class="number-input">
        <button onclick="adjNum('set-daily',-1)">−</button>
        <input type="number" class="form-control" id="set-daily" value="${s.defaultDailyHours||8}" min="1" max="14">
        <button onclick="adjNum('set-daily',1)">+</button>
      </div>
    </div>
    <div class="settings-section">
      <h3>🏷️ Ders Saati Etiketleri</h3>
      <div id="saat-etiketler" style="display:flex;flex-direction:column;gap:6px;max-height:250px;overflow-y:auto">
        ${(s.hourLabels||[]).map((lbl,i)=>`<div class="flex items-center gap-8">
          <span style="font-size:.78rem;color:var(--text3);width:16px;text-align:right">${i+1}.</span>
          <input class="form-control" id="hlbl-${i}" value="${esc(lbl)}" style="width:140px">
        </div>`).join('')}
      </div>
    </div>
    <button class="btn btn-primary btn-lg" onclick="saveAyarlar()">💾 Ayarları Kaydet</button>
  </div>`;
}

function bindAyarlar() {
  window._selectedDays = [...state.settings.weekDays];
  window._weekendDays = [...(state.settings.weekendDays||[])];
}

function toggleDay(day) {
  const weekdays = ['Pazartesi','Salı','Çarşamba','Perşembe','Cuma'];
  const isWeekday = weekdays.includes(day);
  const arr = isWeekday ? window._selectedDays : window._weekendDays;
  const idx = arr.indexOf(day);
  if (idx>=0) arr.splice(idx,1);
  else arr.push(day);
  const key = day.replace(/\s/g,'');
  const el = document.getElementById('daychip-'+key);
  if(el) el.classList.toggle('selected', arr.includes(day));
}

function saveAyarlar() {
  const daily = parseInt(document.getElementById('set-daily').value)||8;
  const labels = [];
  for(let i=0;i<14;i++){
    const el=document.getElementById('hlbl-'+i);
    if(el) labels.push(el.value||((i+1)+'.Ders'));
    else break;
  }
  state.settings = {
    ...state.settings,
    schoolName: document.getElementById('set-schoolname').value.trim(),
    schoolYear: document.getElementById('set-year').value.trim(),
    schoolType: document.getElementById('set-type').value,
    principalName: document.getElementById('set-principal').value.trim(),
    principalTitle: document.getElementById('set-prtitle').value.trim(),
    defaultDailyHours: daily,
    weekDays: window._selectedDays||state.settings.weekDays,
    weekendDays: window._weekendDays||[],
    hourLabels: labels
  };
  save();
  updateBadges();
  toast('Ayarlar kaydedildi','success');
}

// ═══════════════════════════════════════════════════════════════
// YEDEK & GERİ YÜKLE
// ═══════════════════════════════════════════════════════════════
function renderYedek() {
  return `
  <div style="max-width:700px">
    <div class="settings-section">
      <h3>💾 Yedek Al</h3>
      <p class="help-text mb-12">Tüm verileri JSON dosyası olarak bilgisayarınıza kaydedin</p>
      <button class="btn btn-primary" onclick="backupData()">📥 Yedek İndir (JSON)</button>
    </div>
    <div class="settings-section">
      <h3>📤 Geri Yükle</h3>
      <p class="help-text mb-12">Önceden alınan JSON yedek dosyasından verileri geri yükleyin</p>
      <input type="file" id="restore-file" accept=".json" style="display:none" onchange="restoreData(this)">
      <button class="btn btn-warn" onclick="document.getElementById('restore-file').click()">📤 Yedekten Geri Yükle</button>
    </div>
    <div class="settings-section">
      <h3>🗑️ Modül Sıfırlama</h3>
      <p class="help-text mb-12">Sadece belirli bir modülün verilerini sıfırlayın</p>
      <div class="flex gap-8 flex-wrap">
        <button class="btn btn-ghost btn-sm" onclick="resetModule('dersler')">📚 Dersleri Sıfırla</button>
        <button class="btn btn-ghost btn-sm" onclick="resetModule('siniflar')">🏫 Sınıfları Sıfırla</button>
        <button class="btn btn-ghost btn-sm" onclick="resetModule('ogretmenler')">👨‍🏫 Öğretmenleri Sıfırla</button>
        <button class="btn btn-ghost btn-sm" onclick="resetModule('program')">🗓️ Programı Sıfırla</button>
        <button class="btn btn-ghost btn-sm" onclick="resetModule('derslikler')">🧪 Derslik Verisini Sıfırla</button>
      </div>
    </div>
    <div class="settings-section">
      <h3 style="color:var(--danger)">⚠️ Genel Sıfırlama</h3>
      <p class="help-text mb-12">Tüm veriler silinir ve uygulama fabrika ayarlarına döner</p>
      <button class="btn btn-danger" onclick="resetAll()">🗑️ Tüm Verileri Sil</button>
    </div>
  </div>`;
}
function bindYedek() {}

function backupData() {
  const blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sdrrs_yedek_'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
  toast('Yedek indirildi','success');
}

function restoreData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      confirm('Mevcut tüm veriler silinecek ve yedekten yüklenecek. Emin misiniz?', function() {
        state = {...state, ...parsed};
        save(); toast('Geri yükleme tamamlandı','success'); navigate('dashboard');
      });
    } catch(err) { toast('Geçersiz yedek dosyası','error'); }
  };
  reader.readAsText(file);
  input.value='';
}

function resetModule(mod) {
  const labels = {dersler:'Dersler',siniflar:'Sınıflar',ogretmenler:'Öğretmenler',program:'Program',derslikler:'Derslikler'};
  confirm(`"${labels[mod]}" modülündeki tüm veriler silinecek. Emin misiniz?`, function() {
    if(mod==='program') state.program={};
    else if(mod==='dersler') state.dersler=[];
    else if(mod==='siniflar') state.siniflar=[];
    else if(mod==='ogretmenler') state.ogretmenler=[];
    else if(mod==='derslikler') state.derslikler=[];
    save(); toast(labels[mod]+' sıfırlandı','success'); navigate('yedek');
  });
}

function resetAll() {
  confirm('TÜM VERİLER SİLİNECEK! Bu işlem geri alınamaz. Emin misiniz?', function() {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  });
}

// ═══════════════════════════════════════════════════════════════
// İÇE/DIŞA AKTARIM HELPERS
// ═══════════════════════════════════════════════════════════════
function openExportModal(tip, data) {
  openModal('📤 Dışa Aktar', `
    <p style="color:var(--text2);font-size:.88rem;margin-bottom:12px">${data.length} kayıt dışa aktarılacak</p>
    <div class="flex gap-8">
      <button class="btn btn-primary" onclick="downloadCSV(window._exportData,'${tip}');closeModal()">📄 CSV İndir</button>
      <button class="btn btn-success" onclick="downloadXLSX(window._exportData,'${tip}');closeModal()">📊 XLSX İndir</button>
    </div>
  `, '<button class="btn btn-ghost" onclick="closeModal()">Kapat</button>');
  window._exportData = data;
}

function downloadCSV(data, filename) {
  if (!data || !data.length) { toast('Dışa aktarılacak veri yok','warn'); return; }
  const keys = Object.keys(data[0]);
  const lines = [keys.join(','), ...data.map(row=>keys.map(k=>`"${(row[k]||'').toString().replace(/"/g,'""')}"`).join(','))];
  const blob = new Blob(['\ufeff'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename+'.csv';a.click();
  toast('CSV indirildi','success');
}

function downloadXLSX(data, filename) {
  if (!data || !data.length) { toast('Dışa aktarılacak veri yok','warn'); return; }
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Veri');
  XLSX.writeFile(wb,filename+'.xlsx');
  toast('XLSX indirildi','success');
}

function importData(tip) {
  openModal(`📥 ${tip.charAt(0).toUpperCase()+tip.slice(1)} İçe Aktar`, `
    <div class="alert alert-info mb-12">CSV veya XLSX dosyası seçin. Sütun eşleşmesi bir sonraki adımda yapılacak.</div>
    <div class="form-group">
      <input type="file" id="import-file" accept=".csv,.xlsx,.xls" class="form-control">
    </div>
    <div id="import-preview"></div>
  `, `
    <button class="btn btn-ghost" onclick="closeModal()">İptal</button>
    <button class="btn btn-primary" onclick="processImportFile('${tip}')">Devam →</button>
  `);
  document.getElementById('import-file').addEventListener('change', previewImportFile);
}

function previewImportFile() {
  const file = document.getElementById('import-file').files[0];
  if (!file) return;
  const reader = new FileReader();
  if (file.name.endsWith('.csv')) {
    reader.onload = e => {
      const lines = e.target.result.split('\n').filter(Boolean);
      const headers = lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
      window._importHeaders = headers;
      window._importRows = lines.slice(1).map(l=>l.split(',').map(v=>v.trim().replace(/"/g,'')));
      document.getElementById('import-preview').innerHTML =
        `<div class="alert alert-success">✅ ${lines.length-1} satır okundu. Sütunlar: ${headers.join(', ')}</div>`;
    };
    reader.readAsText(file,'utf-8');
  } else {
    reader.onload = e => {
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{header:1});
      window._importHeaders = (data[0]||[]).map(String);
      window._importRows = data.slice(1);
      document.getElementById('import-preview').innerHTML =
        `<div class="alert alert-success">✅ ${data.length-1} satır okundu. Sütunlar: ${window._importHeaders.join(', ')}</div>`;
    };
    reader.readAsBinaryString(file);
  }
}

function processImportFile(tip) {
  if (!window._importHeaders) { toast('Önce dosya seçin','warn'); return; }
  const fieldMaps = {
    dersler: [{ label:'Ders Adı', key:'ad' }, { label:'Ders Kodu', key:'kod' }, { label:'Blok', key:'blok' }],
    siniflar: [{ label:'Sınıf Adı', key:'ad' }, { label:'Seviye', key:'seviye' }, { label:'Şube', key:'sube' }, { label:'Günlük Saat', key:'gunlukSaat' }],
    ogretmenler: [{ label:'Ad Soyad', key:'ad' }, { label:'Branş', key:'brans' }, { label:'Ünvan', key:'unvan' }]
  };
  const fields = fieldMaps[tip] || fieldMaps.dersler;
  closeModal();
  openModal(`📥 Sütun Eşleştirme — ${tip}`, `
    <div class="alert alert-info mb-12">Her alan için kaynak dosyadaki sütunu seçin</div>
    ${fields.map(f=>`
      <div class="col-map-row">
        <div style="font-weight:700;font-size:.84rem">${esc(f.label)}</div>
        <div class="arrow">→</div>
        <select class="form-control" id="cm-${f.key}">
          <option value="">— Yok —</option>
          ${window._importHeaders.map(h=>`<option value="${esc(h)}">${esc(h)}</option>`).join('')}
        </select>
      </div>`).join('')}
    <hr class="divider">
    <div style="max-height:200px;overflow:auto">
      <p style="font-size:.8rem;color:var(--text3);margin-bottom:6px">Önizleme (ilk 3 satır):</p>
      <table style="font-size:.75rem;width:100%">
        <thead><tr>${window._importHeaders.map(h=>`<th style="padding:3px 6px;background:var(--bg3)">${esc(h)}</th>`).join('')}</tr></thead>
        <tbody>${window._importRows.slice(0,3).map(row=>`<tr>${row.map(v=>`<td style="padding:3px 6px;border-bottom:1px solid var(--border)">${esc(v)}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>
  `, `
    <button class="btn btn-ghost" onclick="closeModal()">İptal</button>
    <button class="btn btn-primary" onclick="finalizeImport('${tip}')">✅ İçe Aktar</button>
  `, 'modal-lg');
}

function finalizeImport(tip) {
  const mapping = {};
  const fieldMaps = {
    dersler: ['ad','kod','blok'],
    siniflar: ['ad','seviye','sube','gunlukSaat'],
    ogretmenler: ['ad','brans','unvan']
  };
  (fieldMaps[tip]||[]).forEach(k=>{
    const el=document.getElementById('cm-'+k);
    if(el?.value) mapping[k]=el.value;
  });
  const getVal = (row,col) => {
    if(!col) return '';
    const idx=window._importHeaders.indexOf(col);
    return idx>=0?String(row[idx]||''):'';
  };
  let count=0;
  window._importRows.forEach(row=>{
    if(tip==='dersler'){
      const ad=getVal(row,mapping.ad);
      if(!ad) return;
      const kod=getVal(row,mapping.kod)||slugify(ad);
      const blokStr=getVal(row,mapping.blok);
      const bloklar=blokStr?blokStr.split('+').map(Number).filter(Boolean):[];
      state.dersler.push({id:genId(),ad,kod,bloklar,seviyeSaat:[],ilkSaat:''});
      count++;
    } else if(tip==='siniflar'){
      const seviye=getVal(row,mapping.seviye)||getVal(row,mapping.ad).replace(/[^0-9]/g,'');
      const sube=getVal(row,mapping.sube)||getVal(row,mapping.ad).replace(/[^A-Za-z]/g,'').toUpperCase();
      const gunlukSaat=parseInt(getVal(row,mapping.gunlukSaat))||state.settings.defaultDailyHours||8;
      const ad=seviye+sube;
      if(!seviye) return;
      state.siniflar.push({id:genId(),sinifSeviye:seviye,sube,ad,gunlukSaat,grup:'tam',model:'ogretmen-gelir',dersler:[],musaitlik:{}});
      count++;
    } else if(tip==='ogretmenler'){
      const ad=getVal(row,mapping.ad);
      if(!ad) return;
      state.ogretmenler.push({id:genId(),ad,branş:getVal(row,mapping.brans),unvan:getVal(row,mapping.unvan)||'Öğretmen',dersAtamalari:[],musaitlik:{},ozelAyarlar:{}});
      count++;
    }
  });
  save(); closeModal(); toast(`${count} kayıt içe aktarıldı`,'success'); navigate(tip);
}

load();
navigate('dashboard');
</script>
